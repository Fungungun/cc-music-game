<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎸 Chord Game — CC's Music Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header { background: linear-gradient(90deg, #e8c62e, #FFF3B0); }
    .page-header h1 { color: #5a4200; }
    .back-btn { border-color: #c8a200; color: #5a4200; }

    .answer-btn {
      min-width: 180px;
      text-align: center;
      font-size: 0.95rem;
    }
    .answer-btn:hover { background: var(--yellow); border-color: #e8c62e; }

    .question-type-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      margin: 8px 4px;
    }
    .chord-badge { background: var(--yellow); color: #5a4200; }
    .cadence-badge { background: var(--pink); color: #8a2040; }

    .play-row {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div data-i18n="loading">Loading piano sounds… 🎹</div>
  </div>

  <header class="page-header">
    <a href="index.html" class="back-btn" aria-label="Back to menu" data-i18n="back">←</a>
    <div style="flex:1;">
      <h1>🎸 Chord Game</h1>
      <div class="subtitle">Identify chords and cadences!</div>
    </div>
    <button id="lang-toggle-btn" class="lang-btn" onclick="toggleLanguage()">中文</button>
  </header>

  <!-- How to Play intro -->
  <div class="intro-box" id="intro-box">
    <div class="intro-header" onclick="toggleIntro()">
      <span data-i18n="how-to-play">How to Play</span>
      <span id="intro-arrow">▼</span>
    </div>
    <div class="intro-body" id="intro-body">
      <p data-i18n="how-chord-game">A chord will appear on the staff. Choose whether it is a major or minor chord, and whether it is in root position or first inversion. In Cadence mode, identify the type of cadence!</p>
    </div>
  </div>

  <main class="main-content">

    <!-- Score -->
    <div class="score-display">
      <div class="score-item"><span data-i18n="score-label">Score</span> <span id="score-correct">0/0</span></div>
      <div class="score-item"><span data-i18n="streak-label">Streak</span> <span id="score-streak">🔥 0</span></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </div>

    <!-- Grade Selector -->
    <div class="mode-row" id="grade-selector"></div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-chords" onclick="setMode('chords')" data-i18n="chord-id">🎵 Chord Identification</button>
      <button class="mode-btn" id="btn-cadences" onclick="setMode('cadences')" data-i18n="cadence-game">🎶 Cadence Game</button>
    </div>

    <!-- Current question type badge -->
    <div class="text-center" id="type-badge"></div>

    <!-- Staff -->
    <div class="staff-container">
      <div id="staff"></div>
    </div>

    <!-- Play row -->
    <div class="play-row">
      <button class="btn btn-yellow" onclick="playCurrentChord()" data-i18n="play">▶ Play</button>
      <button class="btn btn-secondary" onclick="nextQuestion()" data-i18n="skip">Skip →</button>
    </div>

    <!-- Feedback -->
    <div class="feedback empty" id="feedback"></div>

    <!-- Answer grid -->
    <div class="answer-grid" id="answer-grid"></div>

  </main>

  <script src="i18n.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.32/Tone.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs/dist/abcjs-basic-min.js"></script>
  <script src="game.js"></script>
  <script>
    /* ---- Intro toggle ---- */
    function toggleIntro() {
      const body = document.getElementById('intro-body');
      const arrow = document.getElementById('intro-arrow');
      const isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : 'block';
      arrow.textContent = isOpen ? '▼' : '▲';
    }
    document.addEventListener('DOMContentLoaded', function() {
      if (window.innerWidth < 1024) {
        document.getElementById('intro-body').style.display = 'none';
        document.getElementById('intro-arrow').textContent = '▼';
      }
    });

    /* ---- Data ---- */
    const CHORDS = [
      {id:'Cmaj-R', display:'C Major — Root Position',   abc:'[ceg]4',      notes:['C4','E4','G4'],   key:'C', quality:'Major', inv:'Root', grade:1},
      {id:'Gmaj-R', display:'G Major — Root Position',   abc:"[gbd']4",     notes:['G4','B4','D5'],   key:'G', quality:'Major', inv:'Root', grade:1},
      {id:'Fmaj-R', display:'F Major — Root Position',   abc:"[fac']4",     notes:['F4','A4','C5'],   key:'F', quality:'Major', inv:'Root', grade:1},
      {id:'Dmaj-R', display:'D Major — Root Position',   abc:'[d^fa]4',     notes:['D4','F#4','A4'],  key:'D', quality:'Major', inv:'Root', grade:2},
      {id:'Amaj-R', display:'A Major — Root Position',   abc:"[a^c'e']4",   notes:['A4','C#5','E5'],  key:'A', quality:'Major', inv:'Root', grade:2},
      {id:'Amin-R', display:'A Minor — Root Position',   abc:"[ac'e']4",    notes:['A4','C5','E5'],   key:'A', quality:'Minor', inv:'Root', grade:2},
      {id:'Dmin-R', display:'D Minor — Root Position',   abc:'[dfa]4',      notes:['D4','F4','A4'],   key:'D', quality:'Minor', inv:'Root', grade:2},
      {id:'Emin-R', display:'E Minor — Root Position',   abc:'[egb]4',      notes:['E4','G4','B4'],   key:'E', quality:'Minor', inv:'Root', grade:2},
      {id:'Cmaj-1', display:'C Major — 1st Inversion',   abc:"[egc']4",     notes:['E4','G4','C5'],   key:'C', quality:'Major', inv:'1st', grade:3},
      {id:'Gmaj-1', display:'G Major — 1st Inversion',   abc:"[bd'g']4",    notes:['B4','D5','G5'],   key:'G', quality:'Major', inv:'1st', grade:3},
      {id:'Fmaj-1', display:'F Major — 1st Inversion',   abc:"[ac'f']4",    notes:['A4','C5','F5'],   key:'F', quality:'Major', inv:'1st', grade:3},
      {id:'Dmin-1', display:'D Minor — 1st Inversion',   abc:"[fad']4",     notes:['F4','A4','D5'],   key:'D', quality:'Minor', inv:'1st', grade:3},
      {id:'Emin-1', display:'E Minor — 1st Inversion',   abc:"[gbe']4",     notes:['G4','B4','E5'],   key:'E', quality:'Minor', inv:'1st', grade:3},
    ];

    const CADENCES = [
      {id:'perf-C', type:'Perfect',  desc:'V → I in C major', abc:"[gbd']2 [ceg]2|]", chords:[['G4','B4','D5'],['C4','E4','G4']]},
      {id:'plag-C', type:'Plagal',   desc:'IV → I in C major', abc:"[fac']2 [ceg]2|]", chords:[['F4','A4','C5'],['C4','E4','G4']]},
      {id:'perf-G', type:'Perfect',  desc:'V → I in G major',  abc:"[d^fa]2 [gbd']2|]", chords:[['D4','F#4','A4'],['G4','B4','D5']]},
      {id:'plag-G', type:'Plagal',   desc:'IV → I in G major',  abc:"[ceg]2 [gbd']2|]", chords:[['C4','E4','G4'],['G4','B4','D5']]},
      {id:'perf-F', type:'Perfect',  desc:'V → I in F major',  abc:"[ceg]2 [fac']2|]", chords:[['C4','E4','G4'],['F4','A4','C5']]},
      {id:'plag-F', type:'Plagal',   desc:'IV → I in F major', abc:"[_bd'f']2 [fac']2|]", chords:[['Bb4','D5','F5'],['F4','A4','C5']]},
    ];

    /* ---- State ---- */
    let gameMode = 'chords';
    let currentChord = null;
    let currentCadence = null;
    let wrongAttempts = 0;
    let answeredThisRound = false;
    const score = new SessionScore('chord-game');

    function setMode(mode) {
      gameMode = mode;
      document.getElementById('btn-chords').classList.toggle('active', mode === 'chords');
      document.getElementById('btn-cadences').classList.toggle('active', mode === 'cadences');
      nextQuestion();
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function setFeedback(msg, type) {
      const el = document.getElementById('feedback');
      el.textContent = msg;
      el.className = 'feedback ' + (type || 'empty');
    }

    /* ---- Chord Mode ---- */
    function nextChordQuestion() {
      const chordPool = CHORDS.filter(function(c) { return c.grade <= getGrade(); });
      currentChord = pickRandom(chordPool);
      wrongAttempts = 0;
      answeredThisRound = false;

      const abcStr = 'X:1\nT:\nM:4/4\nL:1/4\nK:C\n' + currentChord.abc + '|]';
      renderAbc('staff', abcStr, {scale: 2.5, staffwidth: 180});

      document.getElementById('type-badge').innerHTML =
        '<span class="question-type-badge chord-badge">Chord Identification</span>' +
        '<div style="margin-top:6px;font-size:1rem;color:#666;">What chord is this?</div>';

      const chordPool2 = CHORDS.filter(function(c) { return c.grade <= getGrade(); });
      const distractors = chordPool2.filter(function(c) { return c.id !== currentChord.id; })
        .sort(function() { return Math.random() - 0.5; }).slice(0, 3);
      const all = [currentChord].concat(distractors).sort(function() { return Math.random() - 0.5; });
      buildAnswerBtns(all, function(choice, btn) {
        if (choice.id === currentChord.id) {
          handleCorrect(btn, function() { playChord(currentChord.notes, '2n'); });
        } else {
          handleWrong(btn, currentChord.id);
        }
      }, 'id');
    }

    /* ---- Cadence Mode ---- */
    function nextCadenceQuestion() {
      currentCadence = pickRandom(CADENCES);
      wrongAttempts = 0;
      answeredThisRound = false;

      const abcStr = 'X:1\nT:\nM:4/4\nL:1/4\nK:C\n' + currentCadence.abc;
      renderAbc('staff', abcStr, {scale: 2.5, staffwidth: 220});

      document.getElementById('type-badge').innerHTML =
        '<span class="question-type-badge cadence-badge">Cadence Game</span>' +
        '<div style="margin-top:6px;font-size:1rem;color:#666;">What type of cadence is this?</div>';

      const cadenceTypes = [
        { label: 'Perfect Cadence (V→I)',  value: 'Perfect' },
        { label: 'Plagal Cadence (IV→I)',   value: 'Plagal' },
      ];
      const grid = document.getElementById('answer-grid');
      grid.innerHTML = '';
      cadenceTypes.forEach(function(ct) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = ct.label;
        btn.onclick = function() {
          if (answeredThisRound) return;
          if (ct.value === currentCadence.type) {
            handleCorrect(btn, function() { playCadence(currentCadence); });
          } else {
            handleWrong(btn, currentCadence.type, 'value', cadenceTypes);
          }
        };
        grid.appendChild(btn);
      });
    }

    function playCadence(cadence) {
      playChord(cadence.chords[0], '2n');
      setTimeout(function() { playChord(cadence.chords[1], '2n'); }, 1000);
    }

    function buildAnswerBtns(items, onClickFn, idKey) {
      const grid = document.getElementById('answer-grid');
      grid.innerHTML = '';
      items.forEach(function(item) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = item.display || item.label;
        btn.dataset[idKey || 'id'] = item[idKey || 'id'];
        btn.onclick = function() { onClickFn(item, btn); };
        grid.appendChild(btn);
      });
    }

    function handleCorrect(btn, playFn) {
      if (answeredThisRound) return;
      answeredThisRound = true;
      btn.classList.add('correct-ans');
      triggerStarburst(btn);
      setFeedback(randomCorrect(), 'correct');
      score.onCorrect();
      if (playFn) playFn();
      setTimeout(function() { nextQuestion(); }, 1800);
    }

    function handleWrong(btn, correctId, idKey, items) {
      wrongAttempts++;
      btn.classList.add('wrong-ans');
      addShake(btn);
      setFeedback(randomWrong(), 'wrong');
      score.onWrong();

      if (wrongAttempts >= 2) {
        answeredThisRound = true;
        if (gameMode === 'chords') {
          document.querySelectorAll('.answer-btn').forEach(function(b) {
            if (b.dataset.id === correctId) b.classList.add('correct-ans');
          });
        } else {
          document.querySelectorAll('.answer-btn').forEach(function(b) {
            if (b.textContent.includes(correctId)) b.classList.add('correct-ans');
          });
        }
        setTimeout(function() { nextQuestion(); }, 2200);
      }
    }

    function playCurrentChord() {
      if (gameMode === 'chords' && currentChord) {
        playChord(currentChord.notes, '2n');
      } else if (gameMode === 'cadences' && currentCadence) {
        playCadence(currentCadence);
      }
    }

    function nextQuestion() {
      setFeedback('', 'empty');
      if (gameMode === 'chords') nextChordQuestion();
      else nextCadenceQuestion();
    }

    /* ---- Start ---- */
    initSampler(function() {
      buildGradeSelector('grade-selector', function() { nextQuestion(); });
      nextQuestion();
    });
  </script>
</body>
</html>
