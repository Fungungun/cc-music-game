<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎶 Interval Quiz — Music Maestro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header { background: linear-gradient(90deg, #9b7ee8, #E0D4F7); }
    .page-header h1 { color: #3d1e8a; }
    .back-btn { border-color: #9b7ee8; color: #3d1e8a; }

    .interval-info {
      text-align: center;
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 8px;
    }

    .play-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 8px 0;
    }

    .answer-grid { margin: 16px 0; }

    .answer-btn {
      min-width: 180px;
      background: white;
      border: 2px solid #ddd;
    }
    .answer-btn:hover { background: var(--lavender); border-color: #9b7ee8; }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div data-i18n="loading">Loading piano sounds… 🎹</div>
  </div>

  <header class="page-header">
    <a href="/" class="back-btn" aria-label="Back to menu" data-i18n="back">←</a>
    <div style="flex:1;">
      <h1>🎶 Interval Quiz</h1>
      <div class="subtitle">Name the musical interval!</div>
    </div>
    <button id="lang-toggle-btn" class="lang-btn" onclick="toggleLanguage()">中文</button>
  </header>

  <!-- How to Play intro -->
  <div class="intro-box" id="intro-box">
    <div class="intro-header" onclick="toggleIntro()">
      <span data-i18n="how-to-play">How to Play</span>
      <span id="intro-arrow">▼</span>
    </div>
    <div class="intro-body" id="intro-body">
      <p data-i18n="how-interval-quiz">Two notes will be shown on the staff. Count the distance between them and choose the correct interval name. You can press Play to hear both notes!</p>
    </div>
  </div>

  <main class="main-content">

    <!-- Score -->
    <div class="score-display">
      <div class="score-item"><span data-i18n="score-label">Score</span> <span id="score-correct">0/0</span></div>
      <div class="score-item"><span data-i18n="streak-label">Streak</span> <span id="score-streak">🔥 0</span></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </div>

    <!-- Grade Selector -->
    <div class="mode-row" id="grade-selector"></div>

    <!-- Display mode -->
    <div class="mode-row">
      <button class="mode-btn active" id="btn-harmonic" onclick="setDisplayMode('harmonic')" data-i18n="harmonic">Harmonic (together)</button>
      <button class="mode-btn" id="btn-melodic" onclick="setDisplayMode('melodic')" data-i18n="melodic">Melodic (one by one)</button>
    </div>

    <!-- Staff -->
    <div class="staff-container">
      <div id="staff"></div>
    </div>

    <!-- Interval info -->
    <div class="interval-info" id="interval-info">&nbsp;</div>

    <!-- Play buttons -->
    <div class="play-row">
      <button class="btn btn-lavender" id="btn-play" onclick="playCurrentInterval()" data-i18n="play-notes">▶ Play Notes</button>
      <button class="btn btn-secondary" id="btn-hint" onclick="showHint()" style="display:none;">💡 Hint</button>
      <button class="btn btn-secondary" onclick="nextQuestion()" data-i18n="skip">Skip →</button>
    </div>
    <div id="hint-box" style="display:none;background:#fffde7;border-radius:12px;padding:10px 14px;margin:6px 0;font-size:0.9rem;color:#795548;text-align:center;"></div>

    <!-- Feedback -->
    <div class="feedback empty" id="feedback"></div>

    <!-- Answer buttons -->
    <div class="answer-grid" id="answer-grid"></div>

  </main>

  <script src="i18n.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.32/Tone.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs/dist/abcjs-basic-min.js"></script>
  <script src="game.js"></script>
  <script>
    /* ---- Intro toggle ---- */
    function toggleIntro() {
      const body = document.getElementById('intro-body');
      const arrow = document.getElementById('intro-arrow');
      const isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : 'block';
      arrow.textContent = isOpen ? '▼' : '▲';
    }
    document.addEventListener('DOMContentLoaded', function() {
      if (window.innerWidth < 1024) {
        document.getElementById('intro-body').style.display = 'none';
        document.getElementById('intro-arrow').textContent = '▼';
      }
    });

    // grade: minimum grade at which this interval is introduced
    const INTERVALS = [
      { name:'Unison (1st)',   number:'1st', short:'P1', semitones:0,  grade:1 },
      { name:'Major 2nd',      number:'2nd', short:'M2', semitones:2,  grade:1 },
      { name:'Minor 3rd',      number:'3rd', short:'m3', semitones:3,  grade:2 },
      { name:'Major 3rd',      number:'3rd', short:'M3', semitones:4,  grade:1 },
      { name:'Perfect 4th',    number:'4th', short:'P4', semitones:5,  grade:1 },
      { name:'Diminished 5th', number:'5th', short:'d5', semitones:6,  grade:2 },
      { name:'Perfect 5th',    number:'5th', short:'P5', semitones:7,  grade:1 },
      { name:'Minor 6th',      number:'6th', short:'m6', semitones:8,  grade:2 },
      { name:'Major 6th',      number:'6th', short:'M6', semitones:9,  grade:2 },
      { name:'Minor 7th',      number:'7th', short:'m7', semitones:10, grade:2 },
      { name:'Major 7th',      number:'7th', short:'M7', semitones:11, grade:2 },
      { name:'Octave (8th)',   number:'8th', short:'P8', semitones:12, grade:1 },
    ];

    // Grade 1: only C, G, F roots; Grade 2+: all
    const ROOT_NOTES_G1 = ['C4','G4','F4'];
    const ROOT_NOTES_G2 = ['C4','D4','E4','F4','G4','A4'];
    function getRootNotes() {
      return getGrade() === 1 ? ROOT_NOTES_G1 : ROOT_NOTES_G2;
    }

    /* ---- Song hints per interval ---- */
    var INTERVAL_SONGS = {
      'P1':'same note twice',
      'M2':'"Happy Birthday" (1st→2nd note)',
      'm3':'"Smoke on the Water" riff',
      'M3':'"When the Saints Go Marching In"',
      'P4':'"Here Comes the Bride"',
      'd5':'"The Simpsons" theme',
      'P5':'"Star Wars" theme',
      'm6':'"The Entertainer"',
      'M6':'"My Bonnie Lies Over the Ocean"',
      'm7':'"Somewhere" (West Side Story)',
      'M7':'almost an octave — very tense!',
      'P8':'"Somewhere Over the Rainbow" (1st→2nd note)'
    };

    /* ---- State ---- */
    let currentRoot = 'C4';
    let currentInterval = null;
    let currentUpper = null;
    let wrongAttempts = 0;
    let answeredThisRound = false;
    let displayMode = 'harmonic';
    const score = new SessionScore('interval-quiz');
    attachMilestoneTracker(score, 10);

    function showHint() {
      var hint = INTERVAL_SONGS[currentInterval.short];
      if (!hint) return;
      var box = document.getElementById('hint-box');
      box.textContent = '🎵 Think: ' + hint;
      box.style.display = 'block';
      document.getElementById('btn-hint').style.display = 'none';
    }

    function setDisplayMode(mode) {
      displayMode = mode;
      document.getElementById('btn-harmonic').classList.toggle('active', mode === 'harmonic');
      document.getElementById('btn-melodic').classList.toggle('active', mode === 'melodic');
      renderCurrentStaff();
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getIntervalPool() {
      return INTERVALS.filter(function(i) { return i.grade <= getGrade(); });
    }

    // Grade 1: answer by number only ("3rd"), Grade 2+: by name ("Major 3rd")
    function intervalLabel(interval) {
      return getGrade() === 1 ? interval.number : interval.name;
    }

    function pickDistractors(correct, count) {
      const pool = getIntervalPool();
      var key = getGrade() === 1 ? 'number' : 'short';
      var others = pool.filter(function(i) { return i[key] !== correct[key]; });
      // For Grade 1, deduplicate by number
      if (getGrade() === 1) {
        var seen = {};
        others = others.filter(function(i) { if (seen[i.number]) return false; seen[i.number]=true; return true; });
      }
      return others.sort(function() { return Math.random() - 0.5; }).slice(0, count);
    }

    function toTonalInterval(short) {
      return short.slice(1) + short[0];
    }

    function generateQuestion() {
      currentRoot = pickRandom(getRootNotes());
      const pool = getIntervalPool();
      currentInterval = pickRandom(pool);
      try {
        currentUpper = Tonal.Note.transpose(currentRoot, toTonalInterval(currentInterval.short));
        if (!currentUpper || Tonal.Note.get(currentUpper).empty) {
          const upperMidi = Tonal.Note.midi(currentRoot) + currentInterval.semitones;
          currentUpper = Tonal.Note.fromMidi(upperMidi);
        }
      } catch(e) {
        const upperMidi = Tonal.Note.midi(currentRoot) + currentInterval.semitones;
        currentUpper = Tonal.Note.fromMidi(upperMidi);
      }
      wrongAttempts = 0;
      answeredThisRound = false;
    }

    function renderCurrentStaff() {
      const abc1 = toneToAbc(currentRoot);
      const abc2 = toneToAbc(currentUpper);
      let abcStr;
      if (displayMode === 'harmonic') {
        abcStr = 'X:1\nT:\nM:4/4\nL:1/4\nK:C\n[' + abc1 + abc2 + ']4|]';
      } else {
        abcStr = 'X:1\nT:\nM:4/4\nL:1/4\nK:C\n' + abc1 + '2 ' + abc2 + '2|]';
      }
      renderAbc('staff', abcStr, {scale: 2.5, staffwidth: 200});
    }

    function buildAnswerButtons(correctInterval) {
      const distractors = pickDistractors(correctInterval, 3);
      // For Grade 1, deduplicate correct from distractors by number
      var all = [correctInterval].concat(distractors).sort(function() { return Math.random() - 0.5; });
      const grid = document.getElementById('answer-grid');
      grid.innerHTML = '';
      all.forEach(function(interval) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = intervalLabel(interval);
        btn.setAttribute('data-short', interval.short);
        btn.onclick = function() { checkAnswer(interval, btn); };
        grid.appendChild(btn);
      });
    }

    function isCorrectAnswer(interval) {
      if (getGrade() === 1) return interval.number === currentInterval.number;
      return interval.short === currentInterval.short;
    }

    function checkAnswer(interval, btn) {
      if (answeredThisRound) return;

      if (isCorrectAnswer(interval)) {
        answeredThisRound = true;
        btn.classList.add('correct-ans');
        var hint = INTERVAL_SONGS[currentInterval.short] ? ' 🎵 ' + INTERVAL_SONGS[currentInterval.short] : '';
        setFeedback(randomCorrect() + hint, 'correct');
        triggerStarburst(btn);
        trackAnswer('interval-quiz', currentInterval.short, true);
        score.onCorrect();
        playCurrentInterval();
        setTimeout(function() { nextQuestion(); }, 2000);
      } else {
        wrongAttempts++;
        btn.classList.add('wrong-ans');
        addShake(btn);
        setFeedback(randomWrong(), 'wrong');
        trackAnswer('interval-quiz', currentInterval.short, false);
        score.onWrong();

        if (wrongAttempts >= 2) {
          answeredThisRound = true;
          document.querySelectorAll('.answer-btn').forEach(function(b) {
            if (b.dataset.short === currentInterval.short) b.classList.add('correct-ans');
          });
          var hint = INTERVAL_SONGS[currentInterval.short] ? ' 🎵 Think: ' + INTERVAL_SONGS[currentInterval.short] : '';
          setFeedback('The answer was ' + currentInterval.name + ' (' + currentInterval.semitones + ' semitones)!' + hint, 'wrong');
          setTimeout(function() { nextQuestion(); }, 3000);
        }
      }
    }

    function setFeedback(msg, type) {
      const el = document.getElementById('feedback');
      el.textContent = msg;
      el.className = 'feedback ' + (type || 'empty');
    }

    function playCurrentInterval() {
      if (!currentRoot || !currentUpper) return;
      playMelodic([currentRoot, currentUpper], '4n', 100);
      setTimeout(function() {
        playChord([currentRoot, currentUpper], '2n');
      }, 1000);
    }

    function nextQuestion() {
      generateQuestion();
      renderCurrentStaff();
      buildAnswerButtons(currentInterval);
      setFeedback('', 'empty');
      document.getElementById('interval-info').textContent =
        'Root: ' + currentRoot + ' — what is the interval?';
      // Reset hint
      document.getElementById('hint-box').style.display = 'none';
      var hintBtn = document.getElementById('btn-hint');
      if (INTERVAL_SONGS[currentInterval.short]) {
        hintBtn.style.display = 'inline-flex';
      } else {
        hintBtn.style.display = 'none';
      }
    }

    /* ---- Start ---- */
    initSampler(function() {
      buildGradeSelector('grade-selector', function() { nextQuestion(); });
      nextQuestion();
    });
  </script>
</body>
</html>
