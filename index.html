<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎹 CC's Music Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(135deg, #FFF8FB 0%, #F5F0FF 50%, #F0FFF8 100%); }
    .page-header { background: linear-gradient(90deg, #FF8FAB, #FFB74D); color: white; }
    .page-header h1 { color: white; }
    .module-card[data-accent="pink"]   { background: linear-gradient(135deg, #FFB7C5, #FFD0DA); }
    .module-card[data-accent="mint"]   { background: linear-gradient(135deg, #C7F2E3, #A8EED4); }
    .module-card[data-accent="lavender"] { background: linear-gradient(135deg, #E0D4F7, #CEC0F5); }
    .module-card[data-accent="yellow"] { background: linear-gradient(135deg, #FFF3B0, #FFE87A); }
    .module-card[data-accent="coral"]  { background: linear-gradient(135deg, #FFD4A3, #FFBF7A); }
    .module-card[data-accent="sky"]    { background: linear-gradient(135deg, #D4EEFF, #AADCFF); }
    .module-card[data-accent="purple"] { background: linear-gradient(135deg, #F0D4FF, #E0BAFF); }
    .module-card[data-accent="grape"]  { background: linear-gradient(135deg, #E8D0FF, #D4AAFF); }
    .module-card[data-accent="mint2"]  { background: linear-gradient(135deg, #B2DFDB, #80CBC4); }
    .module-card[data-accent="brown"]  { background: linear-gradient(135deg, #FFD4A3, #FFAB76); }
    /* Special card styling for non-game pages */
    .module-card.card-learn { border: 3px solid #2E8B6E; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1 data-i18n="app-title">🎹 CC's Music Game</h1>
    <button id="lang-toggle-btn" class="lang-btn" onclick="toggleLanguage()">中文</button>
  </header>

  <main class="main-content">
    <div class="hero">
      <p class="tagline" data-i18n="app-tagline">Hi CC! Let's learn music theory! 🌟</p>
    </div>

    <div class="cards-grid" id="cards-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="total-stars" id="total-stars">
      <!-- Total stars injected by JS -->
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="game.js"></script>
  <script>
    const MODULES = [
      {
        id: 'learn',
        titleKey: 'mod-learn',
        descKey: 'desc-learn',
        emoji: '📖',
        accent: 'mint2',
        href: 'learn.html',
        noScore: true,
      },
      {
        id: 'note-namer',
        titleKey: 'mod-note-namer',
        descKey: 'desc-note-namer',
        emoji: '🎵',
        accent: 'pink',
        href: 'note-namer.html'
      },
      {
        id: 'scale-builder',
        titleKey: 'mod-scale-builder',
        descKey: 'desc-scale-builder',
        emoji: '🎼',
        accent: 'mint',
        href: 'scale-builder.html'
      },
      {
        id: 'interval-quiz',
        titleKey: 'mod-interval-quiz',
        descKey: 'desc-interval-quiz',
        emoji: '🎶',
        accent: 'lavender',
        href: 'interval-quiz.html'
      },
      {
        id: 'chord-game',
        titleKey: 'mod-chord-game',
        descKey: 'desc-chord-game',
        emoji: '🎸',
        accent: 'yellow',
        href: 'chord-game.html'
      },
      {
        id: 'rhythm-tapper',
        titleKey: 'mod-rhythm-tapper',
        descKey: 'desc-rhythm-tapper',
        emoji: '🥁',
        accent: 'coral',
        href: 'rhythm-tapper.html'
      },
      {
        id: 'terms-flashcards',
        titleKey: 'mod-terms-flashcards',
        descKey: 'desc-terms-flashcards',
        emoji: '📚',
        accent: 'sky',
        href: 'terms-flashcards.html'
      },
      {
        id: 'form-detective',
        titleKey: 'mod-form-detective',
        descKey: 'desc-form-detective',
        emoji: '🔍',
        accent: 'purple',
        href: 'form-detective.html'
      },
      {
        id: 'guitar-chords',
        titleKey: 'mod-guitar-chords',
        descKey: 'desc-guitar-chords',
        emoji: '🎸',
        accent: 'brown',
        href: 'guitar-chords.html'
      },
      {
        id: 'mock-test',
        titleKey: 'mod-mock-test',
        descKey: 'desc-mock-test',
        emoji: '📝',
        accent: 'grape',
        href: 'mock-test.html'
      }
    ];

    function buildCards() {
      const grid = document.getElementById('cards-grid');
      let totalScore = 0;

      // Only count modules that have score data (exclude mock-test which uses different storage)
      const scoredModules = ['note-namer','scale-builder','interval-quiz','chord-game','guitar-chords','rhythm-tapper','terms-flashcards','form-detective'];

      MODULES.forEach(function(mod) {
        const data = getModuleData(mod.id);
        const score = data.highScore || 0;
        if (scoredModules.indexOf(mod.id) !== -1) {
          totalScore += score;
        }

        const card = document.createElement('a');
        card.className = 'module-card';
        card.href = mod.href;
        card.dataset.accent = mod.accent;

        const title = t(mod.titleKey);
        const desc = t(mod.descKey);

        card.innerHTML =
          '<span class="card-icon">' + mod.emoji + '</span>' +
          '<div class="card-title" data-i18n="' + mod.titleKey + '">' + title + '</div>' +
          '<div class="card-desc" data-i18n="' + mod.descKey + '">' + desc + '</div>' +
          (mod.noScore ? '' : '<div class="card-score">Best: ' + score + ' ✨</div>');
        grid.appendChild(card);
      });

      // Total stars display
      const starsEl = document.getElementById('total-stars');
      const stars = Math.min(totalScore, 50);
      let starStr = '';
      for (let i = 0; i < Math.min(stars, 20); i++) starStr += '⭐';
      starsEl.innerHTML =
        '<div style="margin-bottom:6px;font-size:1rem;color:#666;" data-i18n="overall-progress">' + t('overall-progress') + ': ' + totalScore + '</div>' +
        '<div style="font-size:1.4rem;line-height:1.8;">' + (starStr || '🎵 Start playing to earn stars!') + '</div>';
    }

    buildCards();
  </script>
</body>
</html>
